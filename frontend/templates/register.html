<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký | CALESTIA HOTEL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h2>📝 Tạo Tài Khoản</h2>
            <form onsubmit="event.preventDefault(); register()">
                <div class="form-group">
                    <input type="text" id="reg_username" class="form-control" placeholder="Tên đăng nhập" required>
                </div>
                <div class="form-group">
                    <input type="password" id="reg_password" class="form-control" placeholder="Mật khẩu" required>
                </div>
                <div class="form-group">
                    <input type="text" id="reg_fullname" class="form-control" placeholder="Họ và tên hiển thị" required>
                </div>
                <button type="submit" class="btn-primary">Đăng ký thành viên</button>
            </form>
            
            <a href="/login.html" class="auth-link">Đã có tài khoản? Quay lại đăng nhập</a>
        </div>
    </div>

    <script>
        // Nếu đã đăng nhập thì không cần đăng ký nữa
        if (localStorage.getItem('user_name')) {
            window.location.href = '/index.html';
        }

        async function register() {
            const u = document.getElementById('reg_username').value;
            const p = document.getElementById('reg_password').value;
            const f = document.getElementById('reg_fullname').value;

            try {
                const res = await fetch('http://localhost/api/auth/register', {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p, full_name: f })
                });

                if (!res.ok) throw new Error("Lỗi Nginx");

                const data = await res.json();
                
                if (data.status === 'success') {
                    alert("Đăng ký thành công! Hãy đăng nhập.");
                    window.location.href = '/login.html';
                } else { 
                    alert(data.message); 
                }
            } catch (e) { 
                console.error(e);
                alert("Lỗi đăng ký! Có thể Auth Service chưa chạy."); 
            }
        }
    </script>
</body>
</html>

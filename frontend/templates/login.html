<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập | CALESTIA HOTEL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h2>🔐 Đăng Nhập</h2>
            <form onsubmit="event.preventDefault(); login()">
                <div class="form-group">
                    <input type="text" id="username" class="form-control" placeholder="Tên đăng nhập" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" class="form-control" placeholder="Mật khẩu" required>
                </div>
                <button type="submit" class="btn-primary">Đăng nhập ngay</button>
            </form>
            
            <a href="/register.html" class="auth-link">Chưa có tài khoản? Đăng ký mới</a>
        </div>
    </div>

    <script>
        
        if (localStorage.getItem('access_token')) {
            window.location.href = '/index.html';
        }

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            try {
                const res = await fetch('http://localhost/api/auth/login', {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });

                if (!res.ok) throw new Error("Lỗi kết nối"); 

                const data = await res.json();
                
                if (data.status === 'success') {
                  
                    localStorage.setItem('access_token', data.token);
                    
                    
                    localStorage.setItem('user_name', data.full_name);

                  
                    localStorage.setItem('user_role', data.role); 
                    
                    alert("Đăng nhập thành công!");

              
                    if (data.role === 'admin') {
                        window.location.href = '/admin.html'; // Admin vào thẳng trang quản trị
                    } else {
                        window.location.href = '/index.html'; // Người dùng vào trang chủ
                    }
                } else { 
                    alert(data.message); 
                }
            } catch (e) { 
                console.error(e);
                alert("Lỗi đăng nhập! Kiểm tra lại Auth Service."); 
            }
        }
    </script>
</body>
</html>

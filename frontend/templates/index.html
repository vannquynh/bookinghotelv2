<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ | CALESTIA HOTEL</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
    /* CSS cho Room Card */
    .room-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
        gap: 20px; 
        margin-top: 20px; 
    }

    .room-card { 
        background: white; 
        border-radius: 12px; 
        overflow: hidden; 
        box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        transition: transform 0.3s ease, box-shadow 0.3s ease; 
    }

    .room-card:hover { 
        transform: translateY(-8px); 
        box-shadow: 0 12px 20px rgba(0,0,0,0.15);
    }

   
    .room-img-container { 
        height: 200px; /* Tăng nhẹ chiều cao cho ảnh nhìn thoáng hơn */
        width: 100%;
        background: #f1f2f6; 
        overflow: hidden; 
        position: relative;
    }

    .room-img-container img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* Giúp ảnh phủ kín khung mà không bị méo */
        transition: transform 0.5s ease;
    }

    .room-card:hover .room-img-container img {
        transform: scale(1.1); /* Hiệu ứng zoom nhẹ khi di chuột vào card */
    }

    .room-details { padding: 20px; }
    .room-name { margin: 0 0 10px 0; font-size: 18px; color: #2d3436; font-weight: 700; }
    .room-description { margin: 0 0 10px 0; font-size: 14px; color: #666; line-height: 1.4; min-height: 40px; }
    .room-price { color: #ec4899; font-weight: bold; font-size: 17px; margin-bottom: 15px; }
    
    .btn-book {
        background: linear-gradient(135deg, #fbb6ce 0%, #f9a8d4 100%);
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
        font-weight: bold;
        transition: background 0.2s;
    }
    .btn-book:hover { background: linear-gradient(135deg, #f9a8d4 0%, #ec4899 100%); }

    /* THÊM: CSS cho nút Lịch sử trên Menu */
    .btn-history {
        background: linear-gradient(135deg, #fbb6ce 0%, #f9a8d4 100%);
        color: white;
        padding: 8px 15px; border-radius: 5px;
        text-decoration: none; font-weight: bold; font-size: 14px;
        margin-right: 15px;
        border: none;
        cursor: pointer;
        transition: 0.2s;
    }
    .btn-history:hover { background: linear-gradient(135deg, #f9a8d4 0%, #ec4899 100%); }

    /* Footer Styles */
    .footer {
        background: linear-gradient(135deg, #831843 0%, #9d174d 100%);
        color: white;
        padding: 40px 20px 20px;
        margin-top: 50px;
    }
    .footer-content {
        max-width: 1200px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 30px;
    }
    .footer-section {
        padding: 20px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        backdrop-filter: blur(10px);
    }
    .footer-title {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 15px;
        color: #fbb6ce;
    }
    .footer-text {
        margin: 10px 0;
        font-size: 14px;
        color: #fce7f3;
    }
    .footer-link {
        color: #fbb6ce;
        text-decoration: none;
        font-weight: bold;
        transition: 0.2s;
    }
    .footer-link:hover {
        color: white;
        text-decoration: underline;
    }
    .social-links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
    }
    .social-link {
        display: inline-block;
        padding: 8px 15px;
        background: rgba(255, 255, 255, 0.2);
        color: white;
        text-decoration: none;
        border-radius: 20px;
        font-size: 14px;
        transition: 0.2s;
    }
    .social-link:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: translateY(-2px);
    }
    .footer-bottom {
        text-align: center;
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
        font-size: 12px;
        color: #fce7f3;
    }
</style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">CALESTIA HOTEL</div>
        <div class="user-info">
            <a href="/history.html" class="btn-history">📜 Lịch sử giao dịch</a>

            <span id="user-display" class="user-name">Đang tải...</span>
            <button onclick="logout()" class="btn-logout">Đăng xuất</button>
        </div>
    </nav>

    <div class="main-content">
        <h1 class="section-title">Danh sách phòng nghỉ</h1>
        <div id="room-list" class="room-grid">
            <p>Đang tải dữ liệu...</p>
        </div>
    </div>

    <!-- Footer with Contact Information -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <h3 class="footer-title">📞 Liên hệ đặt phòng trực tiếp</h3>
                <p class="footer-text">Hotline: <a href="tel:1900123456" class="footer-link">1900 123 456</a></p>
                <p class="footer-text">Email: <a href="mailto:booking@calestiahotel.com" class="footer-link">booking@calestiahotel.com</a></p>
            </div>
            <div class="footer-section">
                <h3 class="footer-title">🌸 Kết nối với chúng tôi</h3>
                <div class="social-links">
                    <a href="https://facebook.com/calestiahotel" target="_blank" class="social-link">📘 Facebook</a>
                    <a href="https://instagram.com/calestiahotel" target="_blank" class="social-link">📷 Instagram</a>
                    <a href="https://twitter.com/calestiahotel" target="_blank" class="social-link">🐦 Twitter</a>
                    <a href="https://youtube.com/calestiahotel" target="_blank" class="social-link">📺 YouTube</a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2024 Calestia Hotel. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // 1. Kiểm tra đăng nhập
        const currentUser = localStorage.getItem('user_name');
    
        const historyBtn = document.querySelector('.btn-history');
        const logoutBtn = document.querySelector('.btn-logout');
        const userDisplay = document.getElementById('user-display');

        if (currentUser) {
            // --- TRƯỜNG HỢP ĐÃ ĐĂNG NHẬP ---
            userDisplay.innerText = "Xin chào, " + currentUser;
            historyBtn.style.display = 'inline-block'; // Hiện nút lịch sử
            logoutBtn.style.display = 'inline-block';  // Hiện nút đăng xuất
        } else {
            userDisplay.innerHTML = '<a href="/login.html" style="color:white; text-decoration:none; font-weight:bold; background:linear-gradient(135deg, #fbb6ce 0%, #f9a8d4 100%); padding:5px 10px; border-radius:5px;">Đăng nhập ngay</a>';
            
            // Ẩn các nút không cần thiết
            historyBtn.style.display = 'none';
            logoutBtn.style.display = 'none';
        }

        // 2. Hàm Đăng xuất
        function logout() {
            localStorage.clear(); 
            window.location.href = '/login.html';
        }

        
        const API_URL = "http://localhost/api/room"; 

        // 3. Tải danh sách phòng
        async function loadRooms() {
    try {
        const res = await fetch(`${API_URL}/rooms`); 
        const rooms = await res.json();
        const container = document.getElementById('room-list');
        container.innerHTML = '';
        
        // Tạo một bộ sưu tập ảnh dựa trên tên phòng
        const roomImages = {
            "Phòng Standard": "https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=500&q=80",
            "Phòng Deluxe": "https://images.unsplash.com/photo-1566665797739-1674de7a421a?w=500&q=80",
            "Phòng VIP": "https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=500&q=80",
            "Phòng Tổng Thống": "https://images.unsplash.com/photo-1590490360182-c33d57733427?w=500&q=80"
        };

        rooms.forEach(room => {
          
            const selectedImg = roomImages[room.name] || "https://images.unsplash.com/photo-1566073771259-6a8506099945?w=500&q=80";

            container.innerHTML += `
                <div class="room-card">
                    <div class="room-img-container">
                        <img src="${selectedImg}" alt="${room.name}" class="room-photo">
                    </div>
                    <div class="room-details">
                        <h3 class="room-name">${room.name}</h3>
                        <p class="room-description">${room.description || 'Phòng nghỉ sang trọng với đầy đủ tiện nghi.'}</p>
                        <p class="room-price">${room.price.toLocaleString()} VND
                            <span style="font-size:12px; color:#888; font-weight:normal">/đêm</span>
                        </p>
                        <button class="btn-book" onclick="goToBooking('${room.id}')">
                            Đặt Phòng Ngay
                        </button>
                    </div>
                </div>
            `;
        });
    } catch (err) {
        document.getElementById('room-list').innerHTML = "<p style='color:red;'>❌ Lỗi kết nối Room Service!</p>";
    }
}

        // 4. Hàm chuyển sang trang booking (Kiểm tra Token)
        function goToBooking(roomId) {
            const token = localStorage.getItem('access_token');
            if (!token) {
                if(confirm("🔒 Bạn cần đăng nhập để sử dụng chức năng đặt phòng. Đi đến trang đăng nhập?")) {
                    window.location.href = '/login.html';
                }
            } else {
                window.location.href = `/booking.html?room_id=${roomId}`;
            }
        }

        // Chỉ tải danh sách phòng
        loadRooms();
    </script>
</body>
</html>

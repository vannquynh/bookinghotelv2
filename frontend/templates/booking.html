<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xác nhận đặt phòng | CALESTIA HOTEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #fbb6ce 0%, #f9a8d4 100%);
            --dark-navy: #831843;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: url('https://images.unsplash.com/photo-1571896349842-33c89424de2d?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        .card {
            border: none;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .card-header {
            background: var(--primary-gradient) !important;
            padding: 1.5rem;
            border: none;
        }

        .card-header h4 { font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        .form-label { font-weight: 600; color: var(--dark-navy); font-size: 0.9rem; margin-bottom: 0.5rem; }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #e2e8f0; transition: all 0.3s; }
        .form-control:focus { box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.2); border-color: #ec4899; }
        .form-control[readonly] { background-color: #f8fafc; color: #64748b; }

        /* PHẦN MỚI: Style cho khung chọn thanh toán */
        .payment-method-box {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #e2e8f0;
        }

        .btn-success {
            background: var(--primary-gradient);
            border: none;
            padding: 14px;
            font-weight: 700;
            border-radius: 12px;
            transition: transform 0.2s, filter 0.2s;
        }

        .btn-success:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-outline-secondary { border-radius: 12px; padding: 10px; font-weight: 600; border: 2px solid #e2e8f0; }
        .room-badge { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card mx-auto" style="max-width: 550px;">
            <div class="card-header text-white text-center">
                <h4>📝 Xác nhận đặt phòng <span id="display_room_id" class="room-badge"></span></h4>
            </div>
            <div class="card-body p-4">
                <form id="bookingForm" onsubmit="event.preventDefault(); confirmBooking()">
                    <div class="mb-4">
                        <label class="form-label">👤 Họ và tên khách hàng</label>
                        <input type="text" id="customer_name" class="form-control" readonly>
                        <div class="form-text mt-2">Dữ liệu được xác thực từ tài khoản của bạn.</div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label">📅 Ngày Check-in</label>
                            <input type="date" id="check_in" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label">📅 Ngày Check-out</label>
                            <input type="date" id="check_out" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-4 payment-method-box">
                        <label class="form-label d-block mb-2">💳 Hình thức thanh toán</label>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="payOption" id="payFull" value="full" checked>
                            <label class="form-check-label" for="payFull">Thanh toán toàn bộ (100%)</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="payOption" id="payDeposit" value="deposit">
                            <label class="form-check-label" for="payDeposit">Đặt cọc giữ chỗ (30%)</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="payOption" id="payCash" value="cash">
                            <label class="form-check-label" for="payCash">💵 Tiền mặt (tại quầy)</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="payOption" id="payTransfer" value="transfer">
                            <label class="form-check-label" for="payTransfer">🏦 Chuyển khoản ngân hàng</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="payOption" id="payCard" value="card">
                            <label class="form-check-label" for="payCard">💳 Thẻ tín dụng/Ghi nợ</label>
                        </div>

                        <!-- QR Code cho chuyển khoản -->
                        <div id="qrCodeSection" style="display: none; margin-top: 15px; text-align: center; padding: 15px; background: #f8f9fa; border-radius: 10px;">
                            <p style="margin-bottom: 10px; font-weight: bold; color: #831843;">📱 Quét mã QR để chuyển khoản nhanh</p>
                            <img id="qrCodeImage" src="" alt="QR Code" style="width: 150px; height: 150px; margin-bottom: 10px;">
                            <p style="font-size: 12px; color: #666; margin: 0;">Số tài khoản: 1234567890</p>
                            <p style="font-size: 12px; color: #666; margin: 0;">Ngân hàng: Vietcombank</p>
                            <p style="font-size: 12px; color: #666; margin: 0;">Chủ tài khoản: Calestia Hotel</p>
                        </div>
                    </div>

                    <div class="d-grid gap-3 mt-2">
                        <button type="submit" class="btn btn-success">Xác nhận đặt ngay 🚀</button>
                        <a href="/index.html" class="btn btn-outline-secondary">Hủy bỏ & Quay lại</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const fullName = localStorage.getItem('user_name');
        const token = localStorage.getItem('access_token'); 

        if (fullName && token) {
            document.getElementById('customer_name').value = fullName;
        } else {
            alert("Vui lòng đăng nhập trước!");
            window.location.href = "/login.html";
        }

        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room_id');
        if(roomId) {
            document.getElementById('display_room_id').innerText = "#" + roomId;
        } else {
            alert("Không tìm thấy phòng!");
            window.location.href = "/index.html";
        }

        const today = new Date().toISOString().split('T')[0];
        const tomorrowDate = new Date();
        tomorrowDate.setDate(tomorrowDate.getDate() + 1);
        const tomorrow = tomorrowDate.toISOString().split('T')[0];

        document.getElementById('check_in').value = today;
        document.getElementById('check_in').min = today;
        document.getElementById('check_out').value = tomorrow;
        document.getElementById('check_out').min = tomorrow;

        // Xử lý hiển thị QR Code khi chọn chuyển khoản
        const payOptions = document.querySelectorAll('input[name="payOption"]');
        const qrCodeSection = document.getElementById('qrCodeSection');
        const qrCodeImage = document.getElementById('qrCodeImage');

        // Tạo QR Code cho thông tin ngân hàng
        const bankInfo = "1234567890;Vietcombank;Calestia Hotel";
        qrCodeImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(bankInfo)}`;

        payOptions.forEach(option => {
            option.addEventListener('change', function() {
                if (this.value === 'transfer') {
                    qrCodeSection.style.display = 'block';
                } else {
                    qrCodeSection.style.display = 'none';
                }
            });
        });

        async function confirmBooking() {
            const checkIn = document.getElementById('check_in').value;
            const checkOut = document.getElementById('check_out').value;
            const payOption = document.querySelector('input[name="payOption"]:checked').value;

            if (checkIn >= checkOut) {
                alert("Ngày trả phòng phải sau ngày nhận phòng!");
                return;
            }

            const bookingData = {
                room_id: roomId,
                customer_name: fullName,
                check_in: checkIn,
                check_out: checkOut
            };

            try {
                const res = await fetch('http://localhost/api/booking/book', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token 
                    },
                    body: JSON.stringify(bookingData)
                });

                if (res.status === 401) {
                    alert("Phiên làm việc hết hạn. Vui lòng đăng nhập lại!");
                    window.location.href = "/login.html";
                    return;
                }

                const result = await res.json();
                
                if (result.status === 'pending') {
                    // TÍNH TOÁN SỐ TIỀN HIỂN THỊ
                    let amountToPay = result.amount;
                    let infoText = `Tổng số tiền: ${result.amount.toLocaleString()} VND`;
                    let paymentMethodText = '';

                    if (payOption === 'deposit') {
                        amountToPay = result.amount * 0.3; // Tính 30%
                        infoText = `Số tiền đặt cọc (30%): ${amountToPay.toLocaleString()} VND (Tổng đơn: ${result.amount.toLocaleString()} VND)`;
                        paymentMethodText = 'Đặt cọc';
                    } else if (payOption === 'cash') {
                        paymentMethodText = 'Tiền mặt (tại quầy)';
                        infoText = `Thanh toán bằng tiền mặt tại quầy: ${result.amount.toLocaleString()} VND`;
                    } else if (payOption === 'transfer') {
                        paymentMethodText = 'Chuyển khoản';
                        infoText = `Chuyển khoản: ${result.amount.toLocaleString()} VND`;
                    } else if (payOption === 'card') {
                        paymentMethodText = 'Thẻ tín dụng/Ghi nợ';
                        infoText = `Thanh toán thẻ: ${result.amount.toLocaleString()} VND`;
                    } else {
                        paymentMethodText = 'Thanh toán toàn bộ';
                    }

                    const wantPay = confirm(`✅ Đặt phòng thành công!\n${infoText}\n\nBạn có muốn THANH TOÁN NGAY bây giờ không?`);

                    if (wantPay) {
                        await payBooking(result.booking_id, amountToPay, payOption);
                    } else {
                        window.location.href = "/index.html";
                    }
                } else {
                    alert("Lỗi: " + result.message);
                }
            } catch (e) {
                alert("Lỗi kết nối hệ thống!");
                console.error(e);
            }
        }

        async function payBooking(bookingId, amountPaid, paymentMethod) {
            try {
                const res = await fetch('http://localhost/api/payment/pay', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    // GỬI KÈM amount_paid và payment_method để Backend xử lý
                    body: JSON.stringify({
                        booking_id: bookingId,
                        amount_paid: amountPaid,
                        payment_method: paymentMethod
                    })
                });
                
                const data = await res.json();
                if(res.ok) {
                    alert("🎉 " + data.message);
                } else {
                    alert("Lỗi thanh toán: " + data.message);
                }
                window.location.href = "/index.html";
            } catch (e) {
                alert("Lỗi kết nối thanh toán!");
                window.location.href = "/index.html";
            }
        }
    </script>
</body>
</html>

version: '3.8'

services:
  # 1. Database
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dozikuto
      POSTGRES_DB: hotel_db
    volumes:
      - ./backup_data.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  # 2. RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  # 3. Auth Service (Port 4001)
  auth_service:
    build: .
    command: python backend/services/auth_service/app.py
    ports:
      - "4001:4001"
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - db

  # 4. Room Service (Cũ là Hotel Service - Port 4002)
  room_service:
    build: .
    command: python backend/services/room_service/app.py
    ports:
      - "4002:4002"
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
    depends_on:
      - db

  # 5. Booking Service (Mới tách - Port 4005)
  booking_service:
    build: .
    command: python backend/services/booking_service/app.py
    ports:
      - "4005:4005"
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - db
      - rabbitmq

  # 6. Payment Service (Cổng mới - Port 4003)
  payment_service:
    build: .
    command: python backend/services/payment_service/app.py
    ports:
      - "4003:4003"
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
    depends_on:
      - db

  # 7. Worker
  worker:
    build: .
    command: python worker/email_worker.py
    environment:
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq

  # 8. Web Server (Nginx Gateway)
  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend/templates:/usr/share/nginx/html

      - ./frontend/static:/usr/share/nginx/html/static

      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - auth_service
      - room_service
      - booking_service
      - payment_service

volumes:
  pgdata: